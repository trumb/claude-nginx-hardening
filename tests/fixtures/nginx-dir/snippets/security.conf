# Shared security hardening snippet
# Included by all site configs

# Block dotfiles
location ~ /\. {
    deny all;
    return 404;
}

# Block .env files
location ~* \.env$ {
    deny all;
    return 404;
}

# Block PHP files
location ~* \.php$ {
    return 404;
}

# Block WordPress paths
location ~* ^/wp-(admin|login|content|includes) {
    return 404;
}
