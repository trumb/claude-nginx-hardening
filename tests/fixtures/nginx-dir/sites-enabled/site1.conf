server {
    listen 443 ssl;
    server_name claw.pwnship.com;

    ssl_certificate /etc/ssl/certs/claw.pem;
    ssl_certificate_key /etc/ssl/private/claw.key;

    root /var/www/claw;

    include snippets/security.conf;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name claw.pwnship.com;
    return 301 https://$host$request_uri;
}
