server {
    listen 443 ssl;
    server_name esu.pwnship.com;

    ssl_certificate /etc/ssl/certs/esu.pem;
    ssl_certificate_key /etc/ssl/private/esu.key;

    root /var/www/esu;

    include snippets/security.conf;

    location / {
        proxy_pass http://127.0.0.1:8080;
    }
}

server {
    listen 80;
    server_name esu.pwnship.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.esu.pwnship.com;

    ssl_certificate /etc/ssl/certs/esu.pem;
    ssl_certificate_key /etc/ssl/private/esu.key;

    include snippets/security.conf;

    location / {
        proxy_pass http://127.0.0.1:8081;
    }
}
