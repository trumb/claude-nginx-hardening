# Bad config: proxy_pass without X-Forwarded-For — should FAIL proxy_headers

server {
    listen 443 ssl;
    server_name headers.example.com;

    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health {
        return 200 "ok";
    }

    # Proxy with missing headers — only has Host and X-Real-IP
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Missing: X-Forwarded-For
        # Missing: X-Forwarded-Proto
    }

    location ~ /\. {
        return 404;
    }
}
