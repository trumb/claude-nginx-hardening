# Security-hardened nginx configuration
# BAD: Includes TLSv1 in ssl_protocols

server_tokens off;
autoindex off;

ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
ssl_prefer_server_ciphers on;

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Block dotfiles
location ~ /\. {
    return 404;
}

# Block .env variants
location ~* \.env {
    return 404;
}

# Block source maps
location ~* \.map$ {
    return 404;
}

# Block PHP
location ~* \.php$ {
    return 404;
}

# Block WordPress
location ~* /wp-(admin|login|content|includes|json) {
    return 404;
}

# Block Spring Actuator
location ~* /actuator {
    return 404;
}

# Block Swagger
location ~* /(swagger|api-docs) {
    return 404;
}

# Block debug tools
location ~* /(debug|trace|phpinfo|server-status|server-info) {
    return 404;
}

# Block admin panels
location ~* /(admin|administrator|wp-admin|phpmyadmin|adminer) {
    deny all;
}
